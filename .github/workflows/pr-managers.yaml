name: Managers pull request build

on:
  workflow_call:
    inputs:
      changed:
        description: 'True if this module has been changed and should be rebuilt'
        required: true
        type: string

jobs:

  log-unchanged:
    name: Managers is unchanged
    if: ${{ inputs.changed == 'false' }}
    runs-on: ubuntu-latest

    steps:
      - name: Log this module is unchanged
        run: |
          echo "The managers module is unchanged"

  build-managers:
    name: Build Managers source code and Docker image
    if: ${{ inputs.changed == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup JDK 
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'semeru'
        
      - name: Print githash
        run: |
          echo $GITHUB_SHA > ./managers.githash

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.9
          cache-disabled: true

      # For any modules that were changed in this PR,
      # download their artifacts from this workflow run.

      - name: Download wrapping artifacts from this PR
        id: download-wrapping
        uses: actions/download-artifact@v4
        with:
          name: wrapping
          path: modules/artifacts/dev/galasa

      - name: Download gradle artifacts from this PR
        id: download-gradle
        uses: actions/download-artifact@v4
        with:
          name: gradle
          path: modules/artifacts/dev/galasa

      - name: Download maven artifacts from this PR
        id: download-maven
        uses: actions/download-artifact@v4
        with:
          name: maven
          path: modules/artifacts/dev/galasa

      - name: Download framework artifacts from this PR
        id: download-framework
        uses: actions/download-artifact@v4
        with:
          name: framework
          path: modules/artifacts/dev/galasa

      # For any modules that weren't changed in this PR,
      # download artifacts from the last successful workflow.

      - name: Download wrapping artifacts
        if: ${{ failure() && steps.download-wrapping.outcome == 'failure' }}
        uses: actions/download-artifact@v4
        with:
          name: wrapping
          path: modules/artifacts/dev/galasa
          github-token: ${{ github.token }}
          run-id: 11364581065
  
      - name: Download gradle artifacts
        if: ${{ failure() && steps.download-gradle.outcome == 'failure' }}
        uses: actions/download-artifact@v4
        with:
          name: gradle
          path: modules/artifacts/dev/galasa
          github-token: ${{ github.token }}
          run-id: 11364581065

      - name: Download maven artifacts
        if: ${{ failure() && steps.download-maven.outcome == 'failure' }}
        uses: actions/download-artifact@v4
        with:
          name: maven
          path: modules/artifacts/dev/galasa
          github-token: ${{ github.token }}
          run-id: 11364581065

      - name: Download framework artifacts
        if: ${{ failure() && steps.download-framework.outcome == 'failure' }}
        uses: actions/download-artifact@v4
        with:
          name: framework
          path: modules/artifacts/dev/galasa
          github-token: ${{ github.token }}
          run-id: 11364581065
      
      - name: Build Managers source code
        working-directory: modules/managers
        run: |
          set -o pipefail
          gradle -b galasa-managers-parent/build.gradle check publish --info \
          --no-daemon --console plain \
          -Dorg.gradle.jvmargs=-Xmx4096M \
          -PsourceMaven=${{ github.workspace }}/modules/artifacts \
          -PcentralMaven=https://repo.maven.apache.org/maven2/ \
          -PtargetMaven=${{ github.workspace }}/modules/managers/artifacts 2>&1 | tee build.log

      - name: Upload Gradle Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: managers-gradle-build-log
          path: modules/managers/build.log
          retention-days: 7
            
      - name: Upload Jacoco Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: managers-jacoco-report
          path: modules/managers/galasa-managers-parent/**/**/build/reports/**/*.html
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload managers artifacts
        uses: actions/upload-artifact@v4
        with:
          name: managers
          path: modules/managers/artifacts/dev/galasa
          retention-days: 7