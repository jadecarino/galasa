name: Build from Wrapping

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['modules/wrapping/**']

env:
  REGISTRY: ghcr.io
  NAMESPACE: galasa-dev
  BRANCH: ${{ github.ref_name }}

jobs:

  build-wrapping:
    name: Build the 'wrapping' module of Galasa
    uses: ./.github/workflows/wrapping.yaml
    secrets: inherit

  build-framework:
    name: Build the 'framework' module of Galasa
    needs: [build-wrapping]
    uses: ./.github/workflows/build-from-framework.yaml
    secrets: inherit