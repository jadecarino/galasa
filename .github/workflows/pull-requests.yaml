name: Pull Requests

on:
  pull_request:
    branches: [main]

# env:
#   # These environment variables are set to false as default,
#   # but are updated by the first job below.
#   BUILDUTILS_CHANGED: 'false'
#   WRAPPING_CHANGED: 'false'
#   GRADLE_CHANGED: 'false'
#   MAVEN_CHANGED: 'false'
#   FRAMEWORK_CHANGED: 'false'
#   EXTENSIONS_CHANGED: 'false'
#   MANAGERS_CHANGED: 'false'
#   OBR_CHANGED: 'false'

jobs:

  get-changed-modules:
    name: Get the modules changed in this Pull Request
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get the modules changed in this Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./tools/get-changed-modules.sh --pr-number ${{ github.event.number }}

    outputs:
      buildutils_changed: "$BUILDUTILS_CHANGED"
      wrapping_changed: "$WRAPPING_CHANGED"
      gradle_changed: "$GRADLE_CHANGED"
      maven_changed: "$MAVEN_CHANGED"
      framework_changed: "$FRAMEWORK_CHANGED"
      extensions_changed: "$EXTENSIONS_CHANGED"
      managers_changed: "$MANAGERS_CHANGED"
      obr_changed: "$OBR_CHANGED"

  # Environment variables can't be passed directly to reusable workflows,
  # so they need to be exposed as outputs of this job to be used below.
  # expose-environment-variables:
  #   name: Expose environment variables to pass to build orchestrator
  #   needs: [get-changed-modules]
  #   runs-on: ubuntu-latest

  #   outputs:
  #     buildutils_changed: "$BUILDUTILS_CHANGED"
  #     wrapping_changed: "$WRAPPING_CHANGED"
  #     gradle_changed: "$GRADLE_CHANGED"
  #     maven_changed: "$MAVEN_CHANGED"
  #     framework_changed: "$FRAMEWORK_CHANGED"
  #     extensions_changed: "$EXTENSIONS_CHANGED"
  #     managers_changed: "$MANAGERS_CHANGED"
  #     obr_changed: "$OBR_CHANGED"

  #   steps:
  #     - run: echo "Exposing environment variables"

  # Call the build orchestrator in Pull Request mode.
  build-orchestrator:
    name: Call the Build Orchestrator
    needs: [get-changed-modules]
    uses: ./.github/workflows/build-orchestrator.yaml
    secrets: inherit
    with:
      pull_request_build: ${{ true }}
      buildutils_changed: ${{ needs.get-changed-modules.outputs.buildutils_changed }}
      wrapping_changed: ${{ needs.get-changed-modules.outputs.wrapping_changed }}
      gradle_changed: ${{ needs.get-changed-modules.outputs.gradle_changed }}
      maven_changed: ${{ needs.get-changed-modules.outputs.maven_changed }}
      framework_changed: ${{ needs.get-changed-modules.outputs.framework_changed }}
      extensions_changed: ${{ needs.get-changed-modules.outputs.extensions_changed }}
      managers_changed: ${{ needs.get-changed-modules.outputs.managers_changed }}
      obr_changed: ${{ needs.get-changed-modules.outputs.obr_changed }}