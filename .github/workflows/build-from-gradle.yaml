name: Build from Gradle

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['modules/gradle/**']

env:
  REGISTRY: ghcr.io
  NAMESPACE: galasa-dev
  BRANCH: ${{ github.ref_name }}

jobs:

  build-gradle:
    name: Build the 'gradle' module of Galasa
    uses: ./.github/workflows/gradle.yaml
    secrets: inherit

  build-maven:
    name: Build the 'maven' module of Galasa
    needs: [build-gradle]
    uses: ./.github/workflows/maven.yaml
    secrets: inherit

  build-framework:
    name: Build the 'framework' module of Galasa
    needs: [build-maven]
    uses: ./.github/workflows/framework.yaml
    secrets: inherit

  build-extensions:
    name: Build the 'extensions' module of Galasa
    needs: [build-framework]
    uses: ./.github/workflows/build-extensions.yaml
    secrets: inherit

  build-managers:
    name: Build the 'managers' module of Galasa
    needs: [build-framework]
    uses: ./.github/workflows/build-managers.yaml
    secrets: inherit

  build-obr:
    name: Build the 'obr' module of Galasa
    needs: [build-extensions, build-managers]
    uses: ./.github/workflows/build-obr.yaml
    secrets: inherit