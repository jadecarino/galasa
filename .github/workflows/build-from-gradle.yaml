name: Build from Gradle

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['modules/gradle/**']

env:
  REGISTRY: ghcr.io
  NAMESPACE: galasa-dev
  BRANCH: ${{ github.ref_name }}

jobs:

  build-gradle:
    name: Build the 'gradle' module of Galasa
    uses: ./.github/workflows/gradle.yaml
    secrets: inherit

  build-maven:
    name: Build the 'maven' module of Galasa
    needs: [build-gradle]
    uses: ./.github/workflows/build-from-maven.yaml
    secrets: inherit